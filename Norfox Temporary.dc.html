<body>
<x-dc>
<helmet>
  <title>Norfox — Nordic Foundry Excellence</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #0a0612; }

      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }

    @keyframes planet-float {

      50%       { transform: translateY(-20px); }
    }
    @keyframes aurora-a {
      0%, 100% { transform: translate(-8%, -6%) scale(1.1); }
      50%       { transform: translate(10%, 8%) scale(1.3); }
    }
    @keyframes aurora-b {
      0%, 100% { transform: translate(6%, 4%) scale(1.2); }
      50%       { transform: translate(-10%, -8%) scale(1.05); }
    }
    @keyframes aurora-c {
      0%, 100% { transform: translate(4%, -8%) scale(1.15); }
      50%       { transform: translate(-6%, 10%) scale(1.35); }
    }
  </style>
  <template id="__bundler_thumbnail" data-bg-color="#000000">
    <svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
      <!-- Jupiter planet -->
      <circle cx="400" cy="300" r="210" fill="#CF8E30"/>
      <clipPath id="pc"><circle cx="400" cy="300" r="210"/></clipPath>
      <g clip-path="url(#pc)">
        <rect x="190" y="210" width="420" height="30" fill="#EDD9A3"/>
        <rect x="190" y="240" width="420" height="28" fill="#B87020"/>
        <rect x="190" y="268" width="420" height="30" fill="#E8C87A"/>
        <rect x="190" y="298" width="420" height="22" fill="#4E2C08"/>
        <rect x="190" y="320" width="420" height="30" fill="#CF8E30"/>
        <rect x="190" y="350" width="420" height="28" fill="#F2E4BA"/>
        <rect x="190" y="378" width="420" height="26" fill="#A85818"/>
        <!-- GRS -->
        <ellipse cx="370" cy="310" rx="38" ry="22" fill="#E83010" opacity="0.9"/>
        <!-- Shading -->
        <circle cx="400" cy="300" r="210" fill="url(#sg)"/>
      </g>
      <defs>
        <radialGradient id="sg" cx="35%" cy="30%" r="65%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
          <stop offset="55%" stop-color="rgba(0,0,0,0)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
        </radialGradient>
      </defs>
      <!-- Logo white card -->
      <rect x="230" y="242" width="340" height="116" rx="4" fill="#ffffff" opacity="0.95"/>
      <!-- NOR text (dark) -->
      <text x="258" y="316" font-family="sans-serif" font-weight="800" font-size="52" fill="#2D3A4A" letter-spacing="-1">NOR</text>
      <!-- FOX text (orange) -->
      <text x="392" y="316" font-family="sans-serif" font-weight="800" font-size="52" fill="#D4580A" letter-spacing="-1">FOX</text>
    </svg>
  </template>
</helmet>

<!-- LAYER -1: Aurora gradient background -->
<div style="position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; background: #0c0a1a;">
  <div style="position: absolute; width: 80vmax; height: 80vmax; left: -10%; top: -20%; border-radius: 50%; filter: blur(90px); opacity: 0.85;
              background: radial-gradient(circle, #2bb8e8 0%, #1f6fd6 40%, transparent 70%);
              animation: aurora-a 22s ease-in-out infinite;"></div>
  <div style="position: absolute; width: 75vmax; height: 75vmax; right: -15%; top: -10%; border-radius: 50%; filter: blur(90px); opacity: 0.8;

              animation: aurora-b 26s ease-in-out infinite;"></div>
  <div style="position: absolute; width: 80vmax; height: 80vmax; right: -10%; bottom: -25%; border-radius: 50%; filter: blur(95px); opacity: 0.82;
              background: radial-gradient(circle, #e83a86 0%, #b3247a 45%, transparent 72%);
              animation: aurora-c 24s ease-in-out infinite;"></div>
  <div style="position: absolute; width: 70vmax; height: 70vmax; left: -5%; bottom: -20%; border-radius: 50%; filter: blur(100px); opacity: 0.7;
              background: radial-gradient(circle, #f0a878 0%, #d6663c 45%, transparent 72%);
              animation: aurora-a 28s ease-in-out infinite reverse;"></div>
  <!-- Darkening vignette for logo legibility -->

</div>

<!-- LAYER 0: Jupiter planet -->
<div style="position: fixed; inset: 0; z-index: 0; display: flex; align-items: center; justify-content: center; pointer-events: none;">
  <div style="width: 66vmin; height: 66vmin; flex-shrink: 0; animation: planet-float 10s ease-in-out infinite;">
    <div style="width: 100%; height: 100%; border-radius: 50%; overflow: hidden; position: relative;
                box-shadow: 0 0 90px rgba(200, 115, 30, 0.55), 0 0 220px rgba(170, 80, 15, 0.25);">

      <!-- Scrolling band texture (200% wide for seamless loop) -->

                  background: linear-gradient(to bottom,
                    #EDD9A3  0%,  #EDD9A3  5%,
                    #B87020  5%,  #B87020 10%,
                    #E8C87A 10%,  #E8C87A 16%,
                    #4E2C08 16%,  #4E2C08 21%,
                    #CF8E30 21%,  #CF8E30 27%,
                    #F2E4BA 27%,  #F2E4BA 33%,
                    #A85818 33%,  #A85818 38%,
                    #E3C668 38%,  #E3C668 44%,
                    #5A3510 44%,  #5A3510 49%,
                    #EDD9A3 49%,  #EDD9A3 53%,
                    #B87020 53%,  #B87020 58%,
                    #E8C87A 58%,  #E8C87A 64%,
                    #4E2C08 64%,  #4E2C08 69%,
                    #CF8E30 69%,  #CF8E30 75%,
                    #F2E4BA 75%,  #F2E4BA 81%,
                    #A85818 81%,  #A85818 86%,
                    #E3C668 86%,  #E3C668 92%,
                    #5A3510 92%,  #5A3510 97%,
                    #EDD9A3 97%,  #EDD9A3 100%);">

        <!-- Great Red Spot — first half -->
        <div style="position: absolute; top: 36%; left: 19%; width: 13%; height: 8%; border-radius: 50%;
                    background: radial-gradient(ellipse, #E83010 0%, #BB2505 55%, rgba(80,10,3,0.4) 85%, transparent 100%);
                    box-shadow: 0 0 18px rgba(220, 50, 15, 0.7);"></div>
        <!-- Great Red Spot — second half (seamless loop duplicate) -->
        <div style="position: absolute; top: 36%; left: 69%; width: 13%; height: 8%; border-radius: 50%;
                    background: radial-gradient(ellipse, #E83010 0%, #BB2505 55%, rgba(80,10,3,0.4) 85%, transparent 100%);
                    box-shadow: 0 0 18px rgba(220, 50, 15, 0.7);"></div>
      </div>

      <!-- 3D sphere shading overlay -->
      <div style="position: absolute; inset: 0; border-radius: 50%;
                  background:
                    radial-gradient(circle at 34% 28%, rgba(255,255,255,0.20) 0%, transparent 52%),
                    radial-gradient(circle at 68% 72%, rgba(0,0,0,0.60) 0%, transparent 52%),
                    radial-gradient(circle at 50% 50%, transparent 42%, rgba(0,0,0,0.50) 100%);
                  pointer-events: none;"></div>
    </div>
  </div>
</div>

<!-- LAYER 1: Ember canvas -->
<div style="position: fixed; inset: 0; z-index: 1;">
  <canvas ref="{{ canvasRef }}" style="width: 100%; height: 100%; display: block;"></canvas>
</div>

<!-- LAYER 2: Logo -->
<div style="position: fixed; inset: 0; z-index: 2; display: flex; align-items: center; justify-content: center; padding: 40px; pointer-events: none;">
  <img
    src="uploads/abc68642-c21a-4135-9b10-434d204d082d.png"
    alt="Norfox — Nordic Foundry Excellence"
    style="width: min(760px, 90vw); height: auto; display: block; border-radius: 8px;
           box-shadow: 0 0 70px rgba(220, 90, 20, 0.30), 0 0 140px rgba(220, 90, 20, 0.12);"
  />
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.canvasRef = React.createRef();
    this.particles = [];
    this.animFrame = null;
  }

  renderVals() {
    return { canvasRef: this.canvasRef };
  }

  componentDidMount() {
    this.resize();
    window.addEventListener('resize', () => this.resize());
    this.loop();
  }

  componentWillUnmount() {
    if (this.animFrame) cancelAnimationFrame(this.animFrame);
    window.removeEventListener('resize', () => this.resize());
  }

  resize() {
    const canvas = this.canvasRef.current;
    if (!canvas) return;
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  spawnParticle(canvas) {
    const x = Math.random() * canvas.width;
    const y = canvas.height + 10;
    const size = Math.random() * 2.5 + 0.5;
    const speedY = Math.random() * 1.8 + 0.6;
    const speedX = (Math.random() - 0.5) * 0.6;
    const life = Math.random() * 0.5 + 0.5;
    const hue = Math.random() * 30 + 15;
    const brightness = Math.random() * 20 + 55;
    return { x, y, size, speedY, speedX, life, maxLife: life, hue, brightness, drift: (Math.random() - 0.5) * 0.02 };
  }

  loop() {
    const canvas = this.canvasRef.current;
    if (!canvas) { this.animFrame = requestAnimationFrame(() => this.loop()); return; }
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;

    ctx.clearRect(0, 0, W, H);

    const targetCount = Math.floor(W * H / 8000);
    while (this.particles.length < targetCount) {
      const p = this.spawnParticle(canvas);
      p.y = Math.random() * H;
      this.particles.push(p);
    }
    if (Math.random() < 0.4) this.particles.push(this.spawnParticle(canvas));

    this.particles = this.particles.filter(p => p.life > 0);
    for (const p of this.particles) {
      p.life -= 0.004;
      p.speedX += p.drift;
      p.speedX = Math.max(-1, Math.min(1, p.speedX));
      p.x += p.speedX;
      p.y -= p.speedY;

      const ratio = (p.maxLife > 0) ? Math.max(0, Math.min(1, p.life / p.maxLife)) : 0;
      const alpha = Math.pow(ratio, 0.6) || 0;
      const r = p.size * (1 + (1 - ratio) * 0.5);

      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 3);
      grad.addColorStop(0, `hsla(${p.hue}, 100%, ${p.brightness}%, ${alpha})`);
      grad.addColorStop(0.3, `hsla(${p.hue}, 100%, 45%, ${alpha * 0.6})`);
      grad.addColorStop(1, `hsla(${p.hue}, 80%, 30%, 0)`);

      ctx.beginPath();
      ctx.arc(p.x, p.y, r * 3, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    this.animFrame = requestAnimationFrame(() => this.loop());
  }
}
</script>
</body>
</html>
