<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<title>NORFOX — Casting Simulation & MAGMASOFT® Support in the Nordics</title>
<meta name="description" content="NORFOX helps Nordic foundries and component manufacturers use casting simulation to solve defects, improve processes, and make stronger engineering decisions. Authorized MAGMASOFT® partner for Norway, Sweden, Finland, Denmark, and Iceland." />

<meta property="og:type"        content="website" />

<meta property="og:title"       content="NORFOX — Casting Simulation & MAGMASOFT® Support in the Nordics" />
<meta property="og:description" content="Simulation-based casting analysis, defect investigation, and process improvement for Nordic foundries and component manufacturers — all grounded in casting simulation results and engineering experience." />

<!-- Twitter / X card -->
<meta name="twitter:card"        content="summary_large_image" />
<meta name="twitter:title"       content="NORFOX — Nordic Casting Simulation" />
<meta name="twitter:description" content="Casting simulation and MAGMASOFT® support for foundries and component manufacturers across the Nordics." />

<link rel="apple-touch-icon"     href="images/norfox-favicon.png" />

<!-- Keep crawlers out of the private preview -->
<meta name="robots" content="noindex, nofollow" />

<!-- Icon font (Tabler) — used throughout the site -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css" />

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --graphite:       #1F2529;
    --graphite-deep:  #161A1D;
    --graphite-deeper:#0F1215;
    --orange:         #F05A1A;
    --orange-hover:   #FF6B2B;
    --blue:           #3A6C8C;
    --body-grey:      #4A5158;
    --nordic-grey:    #E6E8EA;
    --light-bg:       #F4F5F6;
    --mid-grey:       #8A9099;
    --white:          #FFFFFF;
    --dark-card:      #262C32;
    --divider-dark:   #363C44;
    --divider-light:  #E6E8EA;
    --f-display: "Barlow Condensed", "Arial Black", "Helvetica Neue", Arial, sans-serif;
    --f-body:    "Inter", "Helvetica Neue", Arial, sans-serif;
    --f-mono:    "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--white); color: var(--graphite); font-family: var(--f-body); -webkit-font-smoothing: antialiased; }
  body { overflow-x: clip; }
  a { color: inherit; text-decoration: none; }

  .container { width: 100%; max-width: 1400px; margin-left: auto; margin-right: auto; padding-left: 32px; padding-right: 32px; }
  @media (max-width: 700px) { .container { padding-left: 20px; padding-right: 20px; } }

  .label   { font-family: var(--f-body); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; }
  .display { font-family: var(--f-display); font-weight: 900; text-transform: uppercase; letter-spacing: 0.04em; line-height: 0.95; }
  .heading { font-family: var(--f-display); font-weight: 800; letter-spacing: 0.02em; line-height: 1.05; }

  .octagon-clip { clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%); }

  .hex-pattern {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='60' height='52' viewBox='0 0 60 52'><path d='M30 1 L58 17 L58 35 L30 51 L2 35 L2 17 Z M30 17 L46 26 L46 26 L30 35 L14 26 L14 26 Z' fill='none' stroke='%233A6C8C' stroke-width='1' opacity='0.5'/></svg>");
    background-size: 60px 52px;
  }

  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .fade-up { opacity:0; animation: fadeUp 0.6s ease-out forwards; }
  .reveal  { opacity:0; transform:translateY(24px); transition: opacity 0.6s ease-out, transform 0.6s ease-out; }
  .reveal.in { opacity:1; transform:translateY(0); }
  @keyframes pulse-dot { 0%,100% { transform:scale(1); opacity:1; } 50% { transform:scale(1.7); opacity:0.5; } }
  @keyframes aurora-a { 0%,100% { transform: translate(-6%,-5%) scale(1.10); } 50% { transform: translate(9%,7%) scale(1.30); } }
  @keyframes aurora-b { 0%,100% { transform: translate(5%,4%) scale(1.20); } 50% { transform: translate(-9%,-7%) scale(1.05); } }
  @keyframes aurora-c { 0%,100% { transform: translate(4%,-7%) scale(1.15); } 50% { transform: translate(-5%,9%) scale(1.35); } }
  @keyframes aurora-d { 0%,100% { transform: translate(5%,5%) scale(1.10); } 50% { transform: translate(-8%,-6%) scale(1.30); } }
  @keyframes magma-shimmer { 0%,100% { filter:drop-shadow(0 0 4px rgba(220,38,38,0.5)); } 50% { filter:drop-shadow(0 0 10px rgba(220,38,38,0.9)); } }
  .magma-nav-link { background: linear-gradient(135deg,#FF2D20 0%,#FF6B35 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; font-weight:700 !important; animation: magma-shimmer 2.4s ease-in-out infinite; }
  .magma-nav-dot  { position:absolute; top:-3px; right:-9px; width:6px; height:6px; border-radius:50%; background:#FF2D20; animation: pulse-dot 1.8s ease-in-out infinite; }

  .svc-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
  .svc-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }

  .btn-primary { display:inline-flex; align-items:center; gap:10px; padding:14px 32px; background:var(--orange); color:var(--white); font-family:var(--f-display); font-weight:700; font-size:14px; letter-spacing:0.1em; text-transform:uppercase; border:none; border-radius:4px; cursor:pointer; transition:background 0.2s, transform 0.2s; }
  .btn-primary:hover { background:var(--orange-hover); transform:scale(1.02); }
  .btn-primary:focus-visible { outline: 3px solid #FFFFFF; outline-offset: 2px; }

  .btn-outline { display:inline-flex; align-items:center; gap:10px; padding:13px 30px; background:transparent; color:var(--white); font-family:var(--f-display); font-weight:700; font-size:14px; letter-spacing:0.1em; text-transform:uppercase; border:1px solid var(--white); border-radius:4px; cursor:pointer; transition:background 0.2s, color 0.2s; }
  .btn-outline:hover { background:var(--white); color:var(--graphite); }

  .btn-outline-dark { display:inline-flex; align-items:center; gap:10px; padding:13px 30px; background:transparent; color:var(--graphite); font-family:var(--f-display); font-weight:700; font-size:14px; letter-spacing:0.1em; text-transform:uppercase; border:1px solid var(--graphite); border-radius:4px; cursor:pointer; }
  .btn-outline-dark:hover { background:var(--graphite); color:var(--white); }

  .nav-link { color:var(--white); font-size:13px; letter-spacing:0.1em; text-transform:uppercase; font-weight:500; padding:6px 0; border-bottom:2px solid transparent; transition:border-color 0.2s; }
  .nav-link:hover { border-bottom-color:var(--orange); }
  .nav-link:focus-visible { outline: 2px solid var(--orange); outline-offset: 4px; border-radius: 2px; }

  a:focus-visible, button:focus-visible {
    outline: 2px solid var(--orange);
    outline-offset: 2px;
    border-radius: 2px;
  }

  input, textarea { font-family: var(--f-body); }
  ::selection { background:var(--orange); color:var(--white); }

  /* ── Lock screen ─────────────────────────────────────── */
  #gate[hidden] { display: none; }
  #gate {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    padding: clamp(20px, 5vw, 48px);
    background:
      radial-gradient(120% 90% at 50% -10%, #232a30 0%, var(--graphite-deep) 55%, var(--graphite-deeper) 100%);
    overflow-y: auto;
  }
  #gate .wrap {
    width: 100%; max-width: 520px;
    display: flex; flex-direction: column; align-items: center; text-align: center;
    gap: clamp(18px, 3.5vw, 28px);
    animation: gate-in .5s ease-out both;
  }
  @keyframes gate-in { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
  #gate .logo {
    background: #fff; border-radius: 12px;
    padding: clamp(12px, 2.5vw, 18px) clamp(18px, 4vw, 26px);
    box-shadow: 0 10px 40px rgba(0,0,0,.45);
  }
  #gate .logo img { display: block; height: clamp(46px, 9vw, 62px); width: auto; }
  #gate .kicker {
    display: inline-flex; align-items: center; gap: 9px;
    font-size: clamp(11px, 2.5vw, 13px); letter-spacing: .22em; text-transform: uppercase;
    color: var(--orange); font-weight: 600;
  }
  #gate .kicker .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--orange); animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .4; transform: scale(1.5); } }
  #gate h1 {
    margin: 0; font-family: var(--f-display); font-weight: 900; text-transform: uppercase;
    letter-spacing: .03em; line-height: .95; color: #fff;
    font-size: clamp(40px, 11vw, 76px);
  }
  #gate p.msg {
    margin: 0; color: #b9c0c7; font-size: clamp(15px, 3.6vw, 18px); line-height: 1.5; max-width: 42ch;
  }
  #gate form { width: 100%; display: flex; flex-direction: column; gap: 14px; margin-top: 4px; }
  #gate input {
    width: 100%; height: clamp(58px, 13vw, 72px);
    background: #232a30; border: 1.5px solid var(--divider-dark); border-radius: 10px;
    color: #fff; font-family: var(--f-mono); font-size: clamp(20px, 6vw, 30px);
    text-align: center; letter-spacing: .55em; text-indent: .55em;
    outline: none; transition: border-color .2s, box-shadow .2s;
  }
  #gate input::placeholder { color: #5a626b; letter-spacing: .2em; text-indent: 0; }
  #gate input:focus { border-color: var(--orange); box-shadow: 0 0 0 4px rgba(240,90,26,.15); }
  #gate button {
    width: 100%; height: clamp(58px, 13vw, 72px); border: none; border-radius: 10px; cursor: pointer;
    background: var(--orange); color: #fff;
    font-family: var(--f-display); font-weight: 800; text-transform: uppercase;
    letter-spacing: .14em; font-size: clamp(15px, 4vw, 19px);
    transition: background .2s, transform .1s;
  }
  #gate button:hover { background: var(--orange-hover); }
  #gate button:active { transform: scale(.99); }
  #gate .foot {
    font-family: var(--f-mono); font-size: clamp(10px, 2.6vw, 12px); letter-spacing: .18em;
    text-transform: uppercase; color: #5a626b; margin-top: 4px;
  }
  #gate.err .wrap { animation: shake .4s; }
  #gate.err input { border-color: #e23b3b; box-shadow: 0 0 0 4px rgba(226,59,59,.15); }
  @keyframes shake { 10%,90%{transform:translateX(-2px);} 20%,80%{transform:translateX(4px);} 30%,50%,70%{transform:translateX(-8px);} 40%,60%{transform:translateX(8px);} }
  #gate .errmsg { color: #ff8a8a; font-size: clamp(12px, 3vw, 14px); min-height: 1.2em; }

  /* ── App loading spinner (after unlock) ──────────────── */
  #booting { position: fixed; inset: 0; z-index: 9998; display: none; align-items: center; justify-content: center; background: var(--graphite-deep); }
  #booting.on { display: flex; }
  #booting .spin { width: 44px; height: 44px; border: 3px solid var(--divider-dark); border-top-color: var(--orange); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

  <!-- Editable defaults read by the React app (tweaks panel) -->
  <script>
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "showHexPattern": true,
      "showOctagonWatermark": true,
      "iconStyle": "solid"
    }/*EDITMODE-END*/;
  </script>

  <!-- The one file you edit on GitHub to toggle / change the password -->
  <script src="site-config.js"></script>

  <!-- React mounts here once unlocked -->
  <div id="root"></div>
  <div id="tweaks-root"></div>

  <!-- Instant lock screen (no heavy libraries) -->
  <div id="gate" hidden>
    <div class="wrap">
      <div class="logo"><img src="images/norfox-favicon.png" alt="NORFOX" /></div>
      <span class="kicker"><span class="dot"></span><span id="g-kicker">UNDER DEVELOPMENT</span></span>
      <h1 id="g-title">PRIVATE PREVIEW</h1>
      <p class="msg" id="g-msg">This area is under development. Enter your access code to continue.</p>
      <form id="g-form" autocomplete="off">
        <input id="g-input" type="password" inputmode="numeric" placeholder="ACCESS CODE"
               aria-label="Access code" autocomplete="off" />
        <div class="errmsg" id="g-err"></div>
        <button type="submit">Enter</button>
      </form>
      <div class="foot" id="g-foot">NORFOX AB · AUTHORIZED ACCESS ONLY</div>
    </div>
  </div>

  <!-- App boot overlay -->
  <div id="booting"><div class="spin"></div></div>

  <!-- ── Gate + lazy app loader ──────────────────────────── -->
  <script>
  (function () {
    var CFG = window.NORFOX_CONFIG || {};
    var KEY = "norfox-dev-auth";

    function loadScript(src, isModule) {
      return new Promise(function (res, rej) {
        var s = document.createElement("script");
        s.src = src; s.crossOrigin = "anonymous";
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }

    // Loads React + Babel + the app ONLY after the gate is passed.
    // This keeps the heavy download off the initial page.
    var booted = false;
    function bootApp() {
      if (booted) return; booted = true;
      var booting = document.getElementById("booting");
      if (booting) booting.classList.add("on");
      loadScript("https://unpkg.com/react@18.3.1/umd/react.production.min.js")
        .then(function () { return loadScript("https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"); })
        .then(function () { return loadScript("https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"); })
        .then(function () {
          ["tweaks-panel.jsx?v=8", "norfox-app.jsx?v=8"].forEach(function (src) {
            var s = document.createElement("script");
            s.type = "text/babel"; s.setAttribute("data-presets", "react"); s.src = src;
            document.body.appendChild(s);
          });
          window.Babel.transformScriptTags();
          // hide overlay shortly after React mounts
          setTimeout(function () { if (booting) booting.classList.remove("on"); }, 400);
        })
        .catch(function () {
          if (booting) booting.innerHTML = "<p style='color:#ff8a8a;font-family:sans-serif'>Failed to load. Please refresh.</p>";
        });
    }

    var alreadyOk = false;
    try { alreadyOk = sessionStorage.getItem(KEY) === "ok"; } catch (e) {}

    // No password, or already unlocked this session → straight to the app.
    if (CFG.passwordEnabled === false || alreadyOk) {
      bootApp();
      return;
    }

    // Otherwise, show the gate.
    var gate  = document.getElementById("gate");
    var form  = document.getElementById("g-form");
    var input = document.getElementById("g-input");
    var err   = document.getElementById("g-err");

    if (CFG.lockKicker)  document.getElementById("g-kicker").textContent = CFG.lockKicker;
    if (CFG.lockTitle)   document.getElementById("g-title").textContent  = CFG.lockTitle;
    if (CFG.lockMessage) document.getElementById("g-msg").textContent    = CFG.lockMessage;
    if (CFG.lockFooter)  document.getElementById("g-foot").textContent   = CFG.lockFooter;

    gate.hidden = false;
    setTimeout(function () { input.focus(); }, 100);

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var val = (input.value || "").trim();
      if (val === String(CFG.password)) {
        try { sessionStorage.setItem(KEY, "ok"); } catch (e2) {}
        gate.style.transition = "opacity .35s ease";
        gate.style.opacity = "0";
        bootApp();
        setTimeout(function () { gate.remove(); }, 360);
      } else {
        err.textContent = "Incorrect code. Please try again.";
        gate.classList.add("err");
        input.value = ""; input.focus();
        setTimeout(function () { gate.classList.remove("err"); }, 450);
      }
    });
  })();
  </script>
</body>
</html>
