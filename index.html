<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Norfox — Nordic Foundry Excellence</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Norfox — Nordic Foundry Excellence. Coming soon." />
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #0a0612; }

    @keyframes aurora-a {
      0%, 100% { transform: translate(-8%, -6%) scale(1.1); }
      50%      { transform: translate(10%, 8%) scale(1.3); }
    }
    @keyframes aurora-b {
      0%, 100% { transform: translate(6%, 4%) scale(1.2); }
      50%      { transform: translate(-10%, -8%) scale(1.05); }
    }
    @keyframes aurora-c {
      0%, 100% { transform: translate(4%, -8%) scale(1.15); }
      50%      { transform: translate(-6%, 10%) scale(1.35); }
    }

    .layer { position: fixed; inset: 0; }

    /* Aurora background */
    #aurora { z-index: 0; overflow: hidden; pointer-events: none; background: #0c0a1a; }
    .blob { position: absolute; border-radius: 50%; }
    .blob.a { width: 80vmax; height: 80vmax; left: -10%; top: -20%; filter: blur(90px); opacity: .85;
      background: radial-gradient(circle, #2bb8e8 0%, #1f6fd6 40%, transparent 70%);
      animation: aurora-a 22s ease-in-out infinite; }
    .blob.b { width: 75vmax; height: 75vmax; right: -15%; top: -10%; filter: blur(90px); opacity: .8;
      background: radial-gradient(circle, #7b34d6 0%, #4a1f9e 45%, transparent 72%);
      animation: aurora-b 26s ease-in-out infinite; }
    .blob.c { width: 80vmax; height: 80vmax; right: -10%; bottom: -25%; filter: blur(95px); opacity: .82;
      background: radial-gradient(circle, #e83a86 0%, #b3247a 45%, transparent 72%);
      animation: aurora-c 24s ease-in-out infinite; }
    .blob.d { width: 70vmax; height: 70vmax; left: -5%; bottom: -20%; filter: blur(100px); opacity: .7;
      background: radial-gradient(circle, #f0a878 0%, #d6663c 45%, transparent 72%);
      animation: aurora-a 28s ease-in-out infinite reverse; }
    #aurora .vignette { position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 48%, rgba(8,4,18,.45) 0%, rgba(8,4,18,.15) 50%, rgba(8,4,18,.55) 100%); }

    /* Embers */
    #embers { z-index: 2; }
    #embers canvas { width: 100%; height: 100%; display: block; }

    /* Slideshow */
    #stage { z-index: 3; display: flex; align-items: center; justify-content: center; padding: 40px; pointer-events: none; }
    #frame { position: relative; width: min(760px, 90vw); aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; }
    #frame img { position: absolute; max-width: 100%; max-height: 100%; height: auto; display: block; border-radius: 8px;
      box-shadow: 0 0 70px rgba(220,90,20,.30), 0 0 140px rgba(220,90,20,.12);
      opacity: 0; transform: rotate(12deg) scale(.82);
      transition: opacity 1.6s ease, transform 1.6s ease; }
    #frame img.active { opacity: 1; transform: rotate(0deg) scale(1); }
  </style>
</head>
<body>
  <div id="aurora" class="layer">
    <div class="blob a"></div>
    <div class="blob b"></div>
    <div class="blob c"></div>
    <div class="blob d"></div>
    <div class="vignette"></div>
  </div>

  <div id="embers" class="layer"><canvas id="ember-canvas"></canvas></div>

  <div id="stage" class="layer">
    <div id="frame">
      <img class="active" src="img/logo.jpg" alt="Norfox — Nordic Foundry Excellence" />
      <img src="img/mug-black.jpg" alt="Norfox black mug" />
      <img src="img/mug-white.jpg" alt="Norfox white mug" />
      <img src="img/mug-octagon.jpg" alt="Norfox octagon mug" />
      <img src="img/sketch.jpg" alt="Norfox logo sketch" />
      <img src="img/character.jpg" alt="Norfox foundry mug character" />
      <img src="img/helmet.jpg" alt="Norfox safety helmet" />
      <img src="img/fox-sketch.jpg" alt="Norfox fox sketch" />
      <img src="img/nordic-map.jpg" alt="Nordic region map" />
      <img src="img/bugatti.jpg" alt="Norfox Bugatti Chiron" />
      <img src="img/volvo-ex60.jpg" alt="Norfox Volvo EX60" />
      <img src="img/excavator.jpg" alt="Norfox Volvo excavator" />
      <img src="img/mousepad.jpg" alt="Norfox mousepad and notebook" />
    </div>
  </div>

  <script>
    /* ---- Slideshow ---- */
    (function () {
      var slides = document.querySelectorAll('#frame img');
      var i = 0;
      setInterval(function () {
        slides[i].classList.remove('active');
        i = (i + 1) % slides.length;
        slides[i].classList.add('active');
      }, 5000);
    })();

    /* ---- Ember particles ---- */
    (function () {
      var canvas = document.getElementById('ember-canvas');
      var ctx = canvas.getContext('2d');
      var particles = [];

      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      window.addEventListener('resize', resize);
      resize();

      function spawn(scatter) {
        return {
          x: Math.random() * canvas.width,
          y: scatter ? Math.random() * canvas.height : canvas.height + 10,
          size: Math.random() * 2.5 + 0.5,
          speedY: Math.random() * 1.8 + 0.6,
          speedX: (Math.random() - 0.5) * 0.6,
          life: Math.random() * 0.5 + 0.5,
          maxLife: 1,
          hue: Math.random() * 30 + 15,
          brightness: Math.random() * 20 + 55,
          drift: (Math.random() - 0.5) * 0.02
        };
      }

      function loop() {
        var W = canvas.width, H = canvas.height;
        ctx.clearRect(0, 0, W, H);

        var target = Math.floor(W * H / 8000);
        while (particles.length < target) {
          var p = spawn(true); p.maxLife = p.life; particles.push(p);
        }
        if (Math.random() < 0.4) { var q = spawn(false); q.maxLife = q.life; particles.push(q); }

        particles = particles.filter(function (p) { return p.life > 0; });
        for (var k = 0; k < particles.length; k++) {
          var pt = particles[k];
          pt.life -= 0.004;
          pt.speedX += pt.drift;
          pt.speedX = Math.max(-1, Math.min(1, pt.speedX));
          pt.x += pt.speedX;
          pt.y -= pt.speedY;

          var ratio = pt.maxLife > 0 ? Math.max(0, Math.min(1, pt.life / pt.maxLife)) : 0;
          var alpha = Math.pow(ratio, 0.6) || 0;
          var r = pt.size * (1 + (1 - ratio) * 0.5);

          var grad = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, r * 3);
          grad.addColorStop(0, 'hsla(' + pt.hue + ', 100%, ' + pt.brightness + '%, ' + alpha + ')');
          grad.addColorStop(0.3, 'hsla(' + pt.hue + ', 100%, 45%, ' + (alpha * 0.6) + ')');
          grad.addColorStop(1, 'hsla(' + pt.hue + ', 80%, 30%, 0)');

          ctx.beginPath();
          ctx.arc(pt.x, pt.y, r * 3, 0, Math.PI * 2);
          ctx.fillStyle = grad;
          ctx.fill();
        }
        requestAnimationFrame(loop);
      }
      loop();
    })();
  </script>
</body>
</html>
